<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>EHR simulator — patients</title>
    <link rel="stylesheet" href="/static/theme.css" />
</head>
<body>
    <main>
        <h1>EHR simulator</h1>
        <p>Pick a patient + chrome variant. Use <kbd>[</kbd>/<kbd>]</kbd> to walk timepoints.</p>
        <ul class="patient-list">
            {% for pid in patient_ids %}
            <li>
                <strong>{{ pid }}</strong>:
                <a href="/patient/{{ pid }}/timepoint/0?chrome=epic">epic</a>
                <span aria-hidden="true">·</span>
                <a href="/patient/{{ pid }}/timepoint/0?chrome=dense">dense</a>
            </li>
            {% endfor %}
        </ul>
    </main>
</body>
</html>
