# Example study configuration — Geneva stroke-unit dataset.
#
# This file points at the real preprocessed Geneva CSV. Edit `csv_path` and
# `params_dir` for your install; the canonical path lives in
# .EXAMPLE_DATA_PATHS in this repo. Optionally set EHR_SIM_DATA_ROOT to
# sandbox path resolution against `_path_traversal_guard`:
#
#   EHR_SIM_DATA_ROOT=/mnt/data1/klug/datasets/opsum \
#     uv run ehr-simulator validate-adapter examples/geneva-config.yaml
#
# EHR_SIM_DATA_ROOT only restricts where paths may point; it does NOT
# discover files. csv_path and params_dir below are required.

schema_version: "1"

# Routes to `load_geneva` from src/ehr_simulator/ingestion/geneva.py.
dataset: geneva

# Absolute paths for portability across CWDs (relative paths resolve
# against this YAML's directory, which is rarely what you want for real
# data on a shared filesystem).
#
# csv_path: the preprocessed-features CSV. ~19.7M rows, ~1.5 GB.
# params_dir: must contain `normalisation_parameters.csv` and
#   `categorical_variable_encoding.csv` — the Geneva pipeline writes them
#   into the date-stamped `logs_*/` subdirectory of the extraction dir.
csv_path:   /mnt/data1/klug/datasets/opsum/short_term_outcomes/with_imaging/gsu_Extraction_20220815_prepro_30012026_154047/preprocessed_features_30012026_154047.csv
params_dir: /mnt/data1/klug/datasets/opsum/short_term_outcomes/with_imaging/gsu_Extraction_20220815_prepro_30012026_154047/logs_30012026_154047

# Replace with real `case_admission_id` values from the dataset. Run
# `validate-adapter` first to confirm the file loads; cross-reference
# the IDs against your pilot patient list. Order is the clinician
# walk-through sequence per session.
patient_ids:
  - REPLACE_WITH_REAL_CASE_ADMISSION_ID_001
  - REPLACE_WITH_REAL_CASE_ADMISSION_ID_002
  - REPLACE_WITH_REAL_CASE_ADMISSION_ID_003

# Geneva timeseries are anchored on `relative_sample_date_hourly_cat`
# (hour buckets), so `hours` is the natural wire format. The simulator
# converts to minutes internally for slicing/storage.
time_unit: hours

# Pilot timepoints: admission, +1h, +6h, +24h, +48h, +72h. Tune these
# to the clinical decision points the study targets.
timepoints: [0, 1, 6, 24, 48, 72]
