# Example study configuration — synthetic dataset.
#
# Works out of the box. Use this as the hello-world to exercise the CLI:
#
#   uv run ehr-simulator validate-config  configs/example_config.yaml configs/example_questions.yaml
#   uv run ehr-simulator validate-adapter configs/example_config.yaml
#   uv run ehr-simulator preflight        configs/example_config.yaml configs/example_questions.yaml
#   uv run ehr-simulator preview          configs/example_config.yaml --patient synth_001
#   uv run ehr-simulator serve --config   configs/example_config.yaml --questions configs/example_questions.yaml
#
# Copy this file (e.g. to configs/my-study.yaml) and edit for a real pilot.
# Anything under configs/ other than the committed example_*.yaml files is
# gitignored — local pilot configs stay out of version control.

schema_version: "1"

# `synthetic` ships three deterministic patients (synth_001/002/003) at
# t = 0, 60, 180 minutes. No paths required. For real datasets switch to
# `geneva` or `mimic` and add csv_path + params_dir.
dataset: synthetic

# Order is meaningful — the simulator walks patients in this sequence per
# clinician session.
patient_ids:
  - synth_001
  - synth_002
  - synth_003

# Either `minutes` or `hours`. Storage and URL ordinals are always in
# minutes; this is just the wire format.
time_unit: minutes

# Sorted ascending, no duplicates, all >= 0. The URL ordinal `t_index`
# maps into this list (t_index=0 -> first timepoint, etc.).
timepoints: [0, 60, 180]
