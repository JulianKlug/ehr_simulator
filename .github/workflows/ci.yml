name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      - name: Pin Python
        run: uv python install ${{ matrix.python-version }}
      - name: Sync
        run: uv sync --locked
      - name: Lint
        run: uv run ruff check .
      - name: Format check
        run: uv run ruff format --check .
      - name: Test
        run: uv run pytest
      - name: Data-contract drift check
        run: uv run python scripts/gen_data_contract.py --check
      - name: Geneva fixture sidecar drift check
        run: uv run python tests/fixtures/geneva/build_geneva_fixture.py --check
      - name: MIMIC fixture sidecar drift check
        run: uv run python tests/fixtures/mimic/build_mimic_fixture.py --check
      - name: CLI smoke
        run: |
          uv run ehr-simulator validate-config \
            tests/fixtures/study/study_synthetic.yaml \
            tests/fixtures/study/questions.yaml
          uv run ehr-simulator validate-adapter \
            tests/fixtures/study/study_synthetic.yaml
          uv run ehr-simulator preflight \
            tests/fixtures/study/study_synthetic.yaml \
            tests/fixtures/study/questions.yaml
          uv run ehr-simulator preview \
            tests/fixtures/study/study_synthetic.yaml \
            --patient synth_001 \
            --questions tests/fixtures/study/questions.yaml \
            --html-out /tmp/preview_smoke
          test -s /tmp/preview_smoke/synth_001_t0.html

  e2e:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      - name: Pin Python
        run: uv python install 3.11
      - name: Sync
        run: uv sync --locked
      - name: Cache Playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('uv.lock') }}
      - name: Install Playwright browsers
        run: uv run playwright install --with-deps chromium
      - name: E2E
        run: uv run pytest -m e2e
